# collide and the longer name wins the space for no extra context.
basin_ns_landmarks = [
    "ouray", "vernal", "dutch_john", "manila",
]

# ── Aliases: surface / near-surface ─────────────────────────────────────────

[aliases.temp_2m]
description   = "Air temperature at 2 m"
units         = "K"
output_var    = "temp_2m"
synoptic_name = "air_temp"
synoptic_units = "C"
[aliases.temp_2m.search]
hrrr = "TMP:2 m above ground"
gefs = "TMP:2 m above ground"
rrfs = "TMP:2 m above ground"

[aliases.dewpoint_2m]
description   = "Dewpoint at 2 m"
units         = "K"
output_var    = "dewpoint_2m"
synoptic_name = "dew_point_temperature"
synoptic_units = "C"
[aliases.dewpoint_2m.search]
hrrr = "DPT:2 m above ground"
gefs = "DPT:2 m above ground"
rrfs = "DPT:2 m above ground"

[aliases.rh_2m]
description   = "Relative humidity at 2 m"
units         = "%"
output_var    = "rh_2m"
synoptic_name = "relative_humidity"
[aliases.rh_2m.search]
hrrr = "RH:2 m above ground"
gefs = "RH:2 m above ground"
rrfs = "RH:2 m above ground"

[aliases.wind_u_10m]
description   = "Eastward wind at 10 m (geographic)"
units         = "m s-1"
output_var    = "wind_u_10m"
synoptic_derived_from = ["wind_speed", "wind_direction"]
[aliases.wind_u_10m.search]
hrrr = "UGRD:10 m above ground"
gefs = "UGRD:10 m above ground"
rrfs = "UGRD:10 m above ground"

[aliases.wind_v_10m]
description   = "Northward wind at 10 m (geographic)"
units         = "m s-1"
output_var    = "wind_v_10m"
synoptic_derived_from = ["wind_speed", "wind_direction"]
[aliases.wind_v_10m.search]
hrrr = "VGRD:10 m above ground"
gefs = "VGRD:10 m above ground"
rrfs = "VGRD:10 m above ground"

[aliases.wind_speed_10m]
description   = "Wind speed at 10 m (derived from U/V)"
units         = "m s-1"
output_var    = "wind_speed_10m"
synoptic_name = "wind_speed"
derived_from  = ["wind_u_10m", "wind_v_10m"]
derivation    = "magnitude_2d"

[aliases.wind_dir_10m]
description   = "Wind direction at 10 m (degrees FROM)"
units         = "degree"
output_var    = "wind_dir_10m"
synoptic_name = "wind_direction"
derived_from  = ["wind_u_10m", "wind_v_10m"]
derivation    = "wind_dir_meteorological"

[aliases.wind_gust_10m]
description   = "Wind gust at surface"
units         = "m s-1"
output_var    = "wind_gust_10m"
synoptic_name = "wind_gust"
[aliases.wind_gust_10m.search]
hrrr = "GUST:surface"
gefs = "GUST:surface"
rrfs = "GUST:surface"

[aliases.wind_u_80m]
description = "Eastward wind at 80 m (HRRR/RRFS)"
units       = "m s-1"
output_var  = "wind_u_80m"
[aliases.wind_u_80m.search]
hrrr = "UGRD:80 m above ground"
rrfs = "UGRD:80 m above ground"

[aliases.wind_v_80m]
description = "Northward wind at 80 m (HRRR/RRFS)"
units       = "m s-1"
output_var  = "wind_v_80m"
[aliases.wind_v_80m.search]
hrrr = "VGRD:80 m above ground"
rrfs = "VGRD:80 m above ground"

[aliases.mslp]
description   = "Mean sea level pressure"
units         = "Pa"
output_var    = "mslp"
synoptic_name = "sea_level_pressure"
synoptic_units = "Pa"
# HRRR uses MSLMA (Membrane SLP); GEFS/RRFS use PRMSL
[aliases.mslp.search]
hrrr = "MSLMA:mean sea level"
gefs = "PRMSL:mean sea level"
rrfs = "PRMSL:mean sea level"

[aliases.pressure_surface]
description   = "Surface pressure"
units         = "Pa"
output_var    = "pressure_surface"
synoptic_name = "pressure"
[aliases.pressure_surface.search]
hrrr = "PRES:surface"
gefs = "PRES:surface"
rrfs = "PRES:surface"

[aliases.terrain_height]
description   = "Model terrain height (surface geopotential height / orography)"
units         = "gpm"
output_var    = "terrain_height"
[aliases.terrain_height.search]
hrrr = "HGT:surface"
gefs = "HGT:surface"
rrfs = "HGT:surface"

[aliases.precip_1hr]
description   = "1-hour accumulated precipitation"
units         = "kg m-2"
output_var    = "precip_1hr"
synoptic_name = "precip_accum_one_hour"
# HRRR sfc carries TWO APCP messages from f02 on -- the run total ("0-N hour acc")
# and the hourly bucket ("N-1-N hour acc") -- so a bare "APCP:surface" matches both
# and Herbie returns a LIST of datasets. Anchor on the hourly bucket: at f01 that is
# "0-1 hour acc" (the only message); from f02 it is the non-zero-start bucket.
# NB absent at f00 (analysis has no accumulation window) -- if you need a value at
# every lead, fetch `precip_total` and difference it along time instead.
[aliases.precip_1hr.search]
hrrr = 'APCP:surface:0-1 hour acc|APCP:surface:(?!0-)\d+-\d+ hour acc'
gefs = "APCP:surface:0-1 hour acc"
rrfs = "APCP:surface:0-1 hour acc"

[aliases.precip_total]
description   = "Run-total accumulated precipitation (init -> valid time)"
units         = "kg m-2"
output_var    = "precip_total"
# Anchored on the "0-N" bucket so it never collides with the hourly one above.
# Present at every lead, including f00 (labelled "0-0 day acc fcst", all zeros).
[aliases.precip_total.search]
hrrr = 'APCP:surface:0-\d+ (hour|day) acc'
rrfs = 'APCP:surface:0-\d+ (hour|day) acc'

[aliases.snowfall_1hr]
description   = "1-hour accumulated snowfall"
units         = "m"
output_var    = "snowfall_1hr"
[aliases.snowfall_1hr.search]
hrrr = "ASNOW:surface"

[aliases.categorical_rain]
description   = "Categorical rain flag"
units         = "flag"
output_var    = "categorical_rain"
[aliases.categorical_rain.search]
hrrr = "CRAIN:surface"

[aliases.categorical_snow]
description   = "Categorical snow flag"
units         = "flag"
output_var    = "categorical_snow"
[aliases.categorical_snow.search]
hrrr = "CSNOW:surface"

[aliases.snow_depth]
description   = "Snow depth"
units         = "m"
output_var    = "snow_depth"
synoptic_name = "snow_depth"
synoptic_units = "mm"
[aliases.snow_depth.search]
hrrr = "SNOD:surface"
gefs = "SNOD:surface"
rrfs = "SNOD:surface"

[aliases.cloud_cover_total]
description = "Total cloud cover"
units       = "%"
output_var  = "cloud_cover_total"
[aliases.cloud_cover_total.search]
hrrr = "TCDC:entire atmosphere"
gefs = "TCDC:entire atmosphere"
rrfs = "TCDC:entire atmosphere"

[aliases.cloud_cover_low]
description = "Low cloud cover"
units       = "%"
output_var  = "cloud_cover_low"
[aliases.cloud_cover_low.search]
hrrr = "LCDC:low cloud layer"
gefs = "LCDC:low cloud layer"
rrfs = "LCDC:low cloud layer"

[aliases.visibility]
description   = "Surface visibility"
units         = "m"
output_var    = "visibility"
synoptic_name = "visibility"
[aliases.visibility.search]
hrrr = "VIS:surface"
gefs = "VIS:surface"
rrfs = "VIS:surface"

[aliases.cape_surface]
description = "Surface-based CAPE"
units       = "J kg-1"
output_var  = "cape_surface"
[aliases.cape_surface.search]
hrrr = "CAPE:surface"
gefs = "CAPE:surface"
rrfs = "CAPE:surface"

[aliases.cin_surface]
description = "Surface-based CIN"
units       = "J kg-1"
output_var  = "cin_surface"
[aliases.cin_surface.search]
hrrr = "CIN:surface"
gefs = "CIN:surface"
rrfs = "CIN:surface"

[aliases.pbl_height]
description = "Planetary boundary layer height"
units       = "m"
output_var  = "pbl_height"
[aliases.pbl_height.search]
hrrr = "HPBL:surface"
rrfs = "HPBL:surface"

# ── Aliases: convective / thunderstorm diagnostics (HRRR sfc, RRFS prslev) ──
# Confirmed against the live HRRR sfc inventory (170 messages, 2026-07-15 18Z).
# The hourly-max fields (MXUPHL / WIND / MAXREF / HAIL / MAXUVV) are labelled
# "N-1-N hour max fcst" from f01 on and "0-0 day max fcst" at f00, so the searches
# below deliberately stop before the window token and still match at every lead.

[aliases.refl_comp]
description = "Simulated composite reflectivity (column maximum)"
units       = "dBZ"
output_var  = "refl_comp"
[aliases.refl_comp.search]
hrrr = "REFC:entire atmosphere"
rrfs = "REFC:entire atmosphere"

[aliases.refl_1km]
description = "Simulated reflectivity 1 km above ground"
units       = "dBZ"
output_var  = "refl_1km"
[aliases.refl_1km.search]
hrrr = "REFD:1000 m above ground"
rrfs = "REFD:1000 m above ground"

[aliases.echo_top]
description = "Radar echo top height"
units       = "m"
output_var  = "echo_top"
[aliases.echo_top.search]
hrrr = "RETOP:cloud top"
rrfs = "RETOP:cloud top"

[aliases.prate]
description = "Instantaneous surface precipitation rate"
units       = "kg m-2 s-1"
output_var  = "prate"
[aliases.prate.search]
hrrr = "PRATE:surface"
rrfs = "PRATE:surface"

[aliases.pwat]
description = "Precipitable water (whole column)"
units       = "kg m-2"
output_var  = "pwat"
[aliases.pwat.search]
hrrr = "PWAT:entire atmosphere"
rrfs = "PWAT:entire atmosphere"

[aliases.cape_ml]
description = "Mixed-layer CAPE (lowest 180 hPa mean parcel)"
units       = "J kg-1"
output_var  = "cape_ml"
[aliases.cape_ml.search]
hrrr = "CAPE:180-0 mb above ground"
rrfs = "CAPE:180-0 mb above ground"

[aliases.cin_ml]
description = "Mixed-layer CIN (lowest 180 hPa mean parcel)"
units       = "J kg-1"
output_var  = "cin_ml"
[aliases.cin_ml.search]
hrrr = "CIN:180-0 mb above ground"
rrfs = "CIN:180-0 mb above ground"

[aliases.cape_mu]
description = "Most-unstable CAPE (lowest 255 hPa)"
units       = "J kg-1"
output_var  = "cape_mu"
[aliases.cape_mu.search]
hrrr = "CAPE:255-0 mb above ground"
rrfs = "CAPE:255-0 mb above ground"

[aliases.srh_0to3km]
description = "0-3 km storm-relative helicity"
units       = "m2 s-2"
output_var  = "srh_0to3km"
[aliases.srh_0to3km.search]
hrrr = "HLCY:3000-0 m above ground"
rrfs = "HLCY:3000-0 m above ground"

[aliases.srh_0to1km]
description = "0-1 km storm-relative helicity"
units       = "m2 s-2"
output_var  = "srh_0to1km"
[aliases.srh_0to1km.search]
hrrr = "HLCY:1000-0 m above ground"
rrfs = "HLCY:1000-0 m above ground"

[aliases.shear_u_0to6km]
description = "0-6 km bulk shear, eastward component"
units       = "m s-1"
output_var  = "shear_u_0to6km"
[aliases.shear_u_0to6km.search]
hrrr = "VUCSH:0-6000 m above ground"
rrfs = "VUCSH:0-6000 m above ground"

[aliases.shear_v_0to6km]
description = "0-6 km bulk shear, northward component"
units       = "m s-1"
output_var  = "shear_v_0to6km"
[aliases.shear_v_0to6km.search]
hrrr = "VVCSH:0-6000 m above ground"
rrfs = "VVCSH:0-6000 m above ground"

[aliases.uphel_max_2to5km]
description = "Hourly-maximum 2-5 km updraft helicity"
units       = "m2 s-2"
output_var  = "uphel_max_2to5km"
[aliases.uphel_max_2to5km.search]
hrrr = "MXUPHL:5000-2000 m above ground"
rrfs = "MXUPHL:5000-2000 m above ground"

[aliases.updraft_max]
description = "Hourly-maximum updraft vertical velocity (100-1000 hPa AGL)"
units       = "m s-1"
output_var  = "updraft_max"
[aliases.updraft_max.search]
hrrr = "MAXUVV:100-1000 mb above ground"
rrfs = "MAXUVV:100-1000 mb above ground"

[aliases.wind_max_10m]
description = "Hourly-maximum 10 m wind speed (distinct from the GUST diagnostic)"
units       = "m s-1"
output_var  = "wind_max_10m"
[aliases.wind_max_10m.search]
hrrr = "WIND:10 m above ground"
rrfs = "WIND:10 m above ground"

[aliases.lightning]
description = "Lightning flash rate"
units       = "flashes km-2 s-1"
output_var  = "lightning"
[aliases.lightning.search]
hrrr = "LTNG:entire atmosphere"

# ── Aliases: pressure levels (3-D, caller passes levels=[...]) ──────────────
# {level} placeholder is substituted per requested level (hPa).

[aliases.temp_pl]
description    = "Temperature on pressure levels"
units          = "K"
output_var     = "temp"
vertical_kind  = "pressure"
default_levels = [1000, 925, 850, 700, 500, 250]
[aliases.temp_pl.search]
hrrr = "TMP:{level} mb"
gefs = "TMP:{level} mb"
rrfs = "TMP:{level} mb"
[aliases.temp_pl.products]
hrrr = "prs"
gefs = "atmos.25"
rrfs = "prslev"

[aliases.wind_u_pl]
description    = "Eastward wind on pressure levels"
units          = "m s-1"
output_var     = "wind_u"
vertical_kind  = "pressure"
default_levels = [1000, 925, 850, 700, 500, 250]
[aliases.wind_u_pl.search]
hrrr = "UGRD:{level} mb"
gefs = "UGRD:{level} mb"
rrfs = "UGRD:{level} mb"
[aliases.wind_u_pl.products]
hrrr = "prs"
gefs = "atmos.25"
rrfs = "prslev"

[aliases.wind_v_pl]
description    = "Northward wind on pressure levels"
units          = "m s-1"
output_var     = "wind_v"
vertical_kind  = "pressure"
default_levels = [1000, 925, 850, 700, 500, 250]
[aliases.wind_v_pl.search]
hrrr = "VGRD:{level} mb"
gefs = "VGRD:{level} mb"
rrfs = "VGRD:{level} mb"
[aliases.wind_v_pl.products]
hrrr = "prs"
gefs = "atmos.25"
rrfs = "prslev"

[aliases.height_pl]
description    = "Geopotential height on pressure levels"
units          = "gpm"
output_var     = "height"
vertical_kind  = "pressure"
default_levels = [1000, 925, 850, 700, 500, 250]
[aliases.height_pl.search]
hrrr = "HGT:{level} mb"
gefs = "HGT:{level} mb"
rrfs = "HGT:{level} mb"
[aliases.height_pl.products]
hrrr = "prs"
gefs = "atmos.25"
rrfs = "prslev"

[aliases.rh_pl]
description    = "Relative humidity on pressure levels"
units          = "%"
output_var     = "rh"
vertical_kind  = "pressure"
default_levels = [1000, 925, 850, 700, 500]
[aliases.rh_pl.search]
hrrr = "RH:{level} mb"
gefs = "RH:{level} mb"
rrfs = "RH:{level} mb"
[aliases.rh_pl.products]
hrrr = "prs"
gefs = "atmos.25"
rrfs = "prslev"

[aliases.dewpoint_pl]
description    = "Dewpoint on pressure levels"
units          = "K"
output_var     = "dewpoint"
vertical_kind  = "pressure"
default_levels = [1000, 925, 850, 700, 500]
[aliases.dewpoint_pl.search]
hrrr = "DPT:{level} mb"
rrfs = "DPT:{level} mb"
[aliases.dewpoint_pl.products]
hrrr = "prs"
rrfs = "prslev"

[aliases.omega_pl]
description    = "Vertical velocity (omega) on pressure levels"
units          = "Pa s-1"
output_var     = "omega"
vertical_kind  = "pressure"
default_levels = [850, 700, 500, 300]
[aliases.omega_pl.search]
hrrr = "VVEL:{level} mb"
gefs = "VVEL:{level} mb"
rrfs = "VVEL:{level} mb"
[aliases.omega_pl.products]
hrrr = "prs"
gefs = "atmos.25"
rrfs = "prslev"

# ── Aliases: native model levels (HRRR/RRFS only) ──────────────────────────

[aliases.temp_ml]
description   = "Temperature on native layers"
units         = "K"
output_var    = "temp_native"
vertical_kind = "model_level"
[aliases.temp_ml.search]
hrrr = "TMP:hybrid level={level}"
rrfs = "TMP:hybrid level={level}"
[aliases.temp_ml.products]
hrrr = "nat"
rrfs = "natlev"

[aliases.wind_u_ml]
description   = "Eastward wind on native layers"
units         = "m s-1"
output_var    = "wind_u_native"
vertical_kind = "model_level"
[aliases.wind_u_ml.search]
hrrr = "UGRD:hybrid level={level}"
rrfs = "UGRD:hybrid level={level}"
[aliases.wind_u_ml.products]
hrrr = "nat"
rrfs = "natlev"

[aliases.wind_v_ml]
description   = "Northward wind on native layers"
units         = "m s-1"
output_var    = "wind_v_native"
vertical_kind = "model_level"
[aliases.wind_v_ml.search]
hrrr = "VGRD:hybrid level={level}"
rrfs = "VGRD:hybrid level={level}"
[aliases.wind_v_ml.products]
hrrr = "nat"
rrfs = "natlev"

# ── Reserved prefixes (documentation only) ──────────────────────────────────
# o3_*, pm25_*, pm10_*, nox_*, co_*, so2_*, aod_*, refl_*, helicity_*,
# uh_*, ltng_*, sw_down, lw_down, shf, lhf, soil_t_*, soil_m_*,
# ventrate, mxhgt

# ── Defaults ────────────────────────────────────────────────────────────────

[defaults]
cache_dir_env_var      = "BRC_TOOLS_HERBIE_CACHE"
prefer_server_subset   = true
download_retries       = 2
download_backoff_secs  = 1
return_nans_on_failure = false
validate_cache         = true
min_grib_size_bytes    = 1000
