# Canonical alias namespace for NWPSource and ObsSource.
# Aliases resolve to per-model Herbie search strings and per-provider
# SynopticPy variable names so NWP and obs frames are joinable on
# (waypoint, valid_time, alias) without bespoke renaming.

schema_version   = 1
units_convention = "CF"

# ── Models ──────────────────────────────────────────────────────────────────

[models.hrrr]
herbie_model         = "hrrr"
description          = "NOAA HRRR, CONUS, 3 km"
init_cadence_hours   = 1
default_product      = "sfc"
default_max_fxx      = 18
extended_init_hours  = [0, 6, 12, 18]
extended_max_fxx     = 48
member_required      = false
grid                 = "lambert_conformal"
nearest_point_method = "kdtree_2d"
crop_method          = "lonlat_after_aux"

[models.hrrr.products]
sfc  = { description = "Surface 2-D",           herbie_name = "sfc"  }
prs  = { description = "Pressure levels 3-D",   herbie_name = "prs"  }
nat  = { description = "Native hybrid levels",  herbie_name = "nat"  }
subh = { description = "15-min sub-hourly sfc",  herbie_name = "subh" }

[models.gefs]
herbie_model         = "gefs"
description          = "NOAA GEFSv12 global ensemble"
init_cadence_hours   = 6
default_product      = "atmos.25"
default_max_fxx      = 240
member_required      = true
default_member       = "c00"
members = [
    "c00",
    "p01", "p02", "p03", "p04", "p05", "p06", "p07", "p08", "p09", "p10",
    "p11", "p12", "p13", "p14", "p15", "p16", "p17", "p18", "p19", "p20",
    "p21", "p22", "p23", "p24", "p25", "p26", "p27", "p28", "p29", "p30",
]
grid                 = "latlon"
nearest_point_method = "ds_sel_nearest"
crop_method          = "lonlat_shift_then_sel"   # native lon is 0..360

[models.gefs.products]
"atmos.25" = { description = "0.25-deg atmos", herbie_name = "atmos.25", max_fxx = 240 }
"atmos.5"  = { description = "0.5-deg atmos",  herbie_name = "atmos.5",  max_fxx = 384 }
[[models.gefs.product_breakpoints]]
above_fxx        = 240
fallback_product = "atmos.5"

[models.rrfs]
herbie_model         = "rrfs"
description          = "NOAA RRFS (experimental, evolving)"
init_cadence_hours   = 1
default_product      = "prslev"
default_max_fxx      = 18
member_required      = false
grid                 = "lambert_conformal"
nearest_point_method = "kdtree_2d"
crop_method          = "lonlat_after_aux"

[models.rrfs.products]
prslev  = { description = "Pressure + surface", herbie_name = "prslev"  }
natlev  = { description = "Native level",       herbie_name = "natlev"  }
testbed = { description = "RRFS testbed",       herbie_name = "testbed" }

[models.gefs_reforecast]
# GEFSv12 Reforecast (Herbie model "gefs_reforecast"): the only Herbie-retrievable
# GEFS-family source covering historical dates (operational "gefs" only reaches 2017).
# Used for WRF-input staging (see brc_tools/nwp/wrf_staging.py), NOT NWPSource.fetch().
# Per-variable file layout: one file = one variable across all lead times in a bucket.
herbie_model          = "gefs_reforecast"
description           = "GEFSv12 Reforecast (2000-2019), daily 00Z, 5 members"
init_cadence_hours    = 24                  # daily 00Z only
default_product       = "GEFSv12/reforecast"
default_max_fxx       = 384
member_required        = true
default_member        = 0                   # integer; 0 -> c00 (control), 1-4 -> p01-p04
members               = [0, 1, 2, 3, 4]
grid                  = "latlon"
crop_method           = "lonlat_shift_then_sel"   # native lon 0..360 (quicklook only)
nearest_point_method  = "ds_sel_nearest"
fxx_bucket_breakpoint = 240                 # fxx <= 240 -> "Days:1-10", else "Days:10-16"

# Curated per-variable tokens to stage for WPS, confirmed against the real S3 listing
# (s3://noaa-gefs-retrospective/GEFSv12/reforecast/2013/2013013100/c00/Days:1-10/).
# Pressure fields are SPLIT at 700 hPa: "{var}_pres" holds <=700 hPa, "{var}_pres_abv700mb"
# holds >700 hPa -- BOTH are needed for the full column. Humidity on pressure/2m is SPECIFIC
# humidity (spfh_*); there is no rh_pres/rh_2m. 10 m winds are ugrd_hgt/vgrd_hgt (height level).
# NOTE: the reforecast has NO land-sea mask and NO snow depth (snod) -> an auth-free NAM analysis
# filler/forcing supplies them (see wrf_staging.stage_nam_analysis and [models.nam_analysis]).
wps_variable_levels = [
  # pressure-level 3-D (both 700 hPa halves)
  "hgt_pres", "hgt_pres_abv700mb",
  "tmp_pres", "tmp_pres_abv700mb",
  "ugrd_pres", "ugrd_pres_abv700mb",
  "vgrd_pres", "vgrd_pres_abv700mb",
  "spfh_pres", "spfh_pres_abv700mb",
  # mean-sea-level / surface
  "pres_msl", "pres_sfc", "hgt_sfc",
  # near-surface
  "tmp_2m", "spfh_2m", "tmp_sfc", "ugrd_hgt", "vgrd_hgt",
  # soil (4 layers each) + snow water equivalent
  "tsoil_bgrnd", "soilw_bgrnd", "weasd_sfc",
]

[models.nam_analysis]
# NAM 12 km analysis (grid 218) from the NCEI historical archive — the auth-free
# WRF/WPS forcing the validated Feb-2013 Basin run uses (Vtable.NAM, fg_name='NAM').
# Replaces the dropped NCAR-RDA ds083.2 FNL filler: NAM analysis carries the full
# field set the GEFS reforecast lacks (land-sea mask, SST, skin temp, 4-layer soil,
# snow), so it works standalone OR as the reforecast's second metgrid stream. One
# whole GRIB per analysis cycle (00/06/12/18Z); staged by stage_nam_analysis via a
# direct HTTP GET (NOT Herbie — Herbie's nam.py has no NCEI historical source).
description       = "NAM 12 km analysis (grid 218), NCEI historical archive"
default_product   = "namanl_218"
cadence_hours     = 6                       # analysis cycles at 00/06/12/18Z
grid              = "218"                    # 12 km CONUS Lambert-conformal
# {yyyymm}/{yyyymmdd}/{hhmm} filled per cycle; .grb (grib1) for the pre-2017 archive.
filename_template = "namanl_218_{yyyymmdd}_{hhmm}_000.grb"
url_template      = "https://www.ncei.noaa.gov/data/north-american-mesoscale-model/access/historical/analysis/{yyyymm}/{yyyymmdd}/{filename}"

[models.rap_analysis]
# RAP 13 km analysis (grid 130), hourly whole-file forcing for the Pelican
# 2013-02-02 12-18Z hot-swap. Same shape as nam_analysis: one whole GRIB per
# analysis cycle, staged by direct HTTP GET (NOT Herbie). Path/filename/grib2 and
# all 7 cycles 12-18Z CONFIRMED by a live NCEI preflight (2026-06-29; ~12 MB/cycle,
# HTTP 200, bogus cycles 404). Still NOT proven for a run: the WPS Vtable choice
# (Vtable.RAP candidates) and RAP field-adequacy (land-sea mask / soil / snow /
# skin-temp / SST) are brc-wrf review items — wps_fg_name is the staging token only.
description         = "RAP 13 km analysis (grid 130), NCEI historical archive"
default_product     = "rap_130"
cadence_hours       = 1                       # hourly analysis cycles
grid                = "130"                    # 13 km CONUS Lambert-conformal
wps_fg_name         = "RAP"                    # WPS fg_name token (Vtable = brc-wrf)
est_bytes_per_cycle = 12_500_000              # ~12 MB/file (NCEI preflight 2026-06-29)
filename_template   = "rap_130_{yyyymmdd}_{hhmm}_000.grb2"
url_template        = "https://www.ncei.noaa.gov/data/rapid-refresh/access/historical/analysis/{yyyymm}/{yyyymmdd}/{filename}"

[models.gfs_analysis]
# GFS 0.5° analysis (grid 004) from the NCEI historical archive — an auth-free,
# field-complete SECOND WRF/WPS forcing for the Pelican 2013-02-02 12-18Z hot-swap
# ("poor-man's ensemble" beside the proven nam_analysis baseline). Same shape as
# nam_analysis/rap_analysis: one whole GRIB2 per analysis cycle, staged by direct
# HTTP GET (NOT Herbie — Herbie's gfs.py has only aws/nomads operational sources,
# which don't reach 2013). Field adequacy CONFIRMED from the live .inv (2026-06-30):
# 4-layer TMP/SOILW below-ground, LAND/TMP/ICEC/WEASD at surface, 26-level
# HGT/TMP/RH/UGRD/VGRD, PRMSL+MSLET, 2 m/10 m — the full set real.exe needs (the
# layered soil + real-ready 3D atmosphere RAP lacked). Maps to Vtable.GFS (brc-wrf).
# Only gap vs NAM: no snod (snow depth); weasd (snow water-equiv) -> metgrid SNOW.
# grid-4 also ships _003/_006 offsets -> optional 3-hourly LBCs (stager change).
description         = "GFS 0.5° analysis (grid 004), NCEI historical archive"
default_product     = "gfsanl_4"
cadence_hours       = 6                       # analysis cycles at 00/06/12/18Z
grid                = "004"                    # 0.5° global lat-lon
wps_fg_name         = "GFS"                    # WPS fg_name token; Vtable.GFS (brc-wrf)
est_bytes_per_cycle = 52_000_000              # ~52 MB/file (NCEI HEAD 2026-06-30)
filename_template   = "gfsanl_4_{yyyymmdd}_{hhmm}_000.grb2"
url_template        = "https://www.ncei.noaa.gov/data/global-forecast-system/access/historical/analysis/{yyyymm}/{yyyymmdd}/{filename}"

